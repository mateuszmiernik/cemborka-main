<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkt - CEMBORKA</title>
    <meta name="description" content="Szczegóły produktu CEMBORKA. Zobacz galerię, opis i specyfikację.">
    <link rel="canonical" href="https://www.cemborka.com/produkt/" id="canonicalLink">
    <meta property="og:locale" content="pl_PL">
    <meta property="og:site_name" content="CEMBORKA">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Produkt - CEMBORKA">
    <meta property="og:description" content="Szczegóły produktu CEMBORKA. Zobacz galerię, opis i specyfikację.">
    <meta property="og:url" content="https://www.cemborka.com/produkt/" id="ogUrlMeta">
    <meta property="og:image" content="https://www.cemborka.com/images/hero.webp">
    <meta property="og:image:alt" content="Produkt CEMBORKA">
    <script>
        (function () {
            var host = window.location.hostname;
            var path = window.location.pathname;
            var base = '/';

            if (/github\.io$/i.test(host)) {
                var segments = path.split('/').filter(Boolean);
                if (segments.length > 0) {
                    base = '/' + segments[0] + '/';
                }
            }

            document.write('<base href="' + base + '">');
        })();
    </script>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="CEMBORKA">
    <link rel="manifest" href="favicon/site.webmanifest">
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var slug = params.get('slug');
            if (!slug) return;

            var url = 'https://www.cemborka.com/produkt/?slug=' + encodeURIComponent(slug);
            var canonicalLink = document.getElementById('canonicalLink');
            var ogUrlMeta = document.getElementById('ogUrlMeta');

            if (canonicalLink) canonicalLink.setAttribute('href', url);
            if (ogUrlMeta) ogUrlMeta.setAttribute('content', url);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/desktop.css" media="(min-width: 1024px)">
</head>
<body class="product-page">
    <!-- HEADER -->
    <header class="header">
        <div class="header-container">
            <button class="back-button">
                <img src="images/back-icon.png" alt="Wstecz" class="back-icon">
            </button>
            <a href="./" class="logo">
                <img src="images/logo.png" alt="CEMBORKA Logo">
            </a>
            <button class="menu-button" aria-label="Menu" aria-expanded="false" type="button">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- PRODUCT DETAIL CONTAINER -->
    <main class="product-detail-container" id="productContainer">
        <!-- Dynamicznie generowana zawartość produktu -->
    </main>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
