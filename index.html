    <script>
        (function () {
            var host = window.location.hostname;
            var path = window.location.pathname;
            var base = '/';

            if (/github\.io$/i.test(host)) {
                var segments = path.split('/').filter(Boolean);
                if (segments.length > 0) {
                    base = '/' + segments[0] + '/';
                }
            }

            document.write('<base href="' + base + '">');
        })();
    </script>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="CEMBORKA">
    <link rel="manifest" href="favicon/site.webmanifest">
    <script>
        (function () {
            if (window.location.protocol === 'file:') return;
            if (!/\/index\.html$/i.test(window.location.pathname)) return;

            var normalizedPath = window.location.pathname.replace(/index\.html$/i, '');
            var normalizedUrl = normalizedPath + window.location.search + window.location.hash;
            window.history.replaceState(null, '', normalizedUrl || '/');
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="home-page">
