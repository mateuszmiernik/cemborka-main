<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - CEMBORKA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/desktop.css" media="(min-width: 1024px)">
</head>
<body class="contact-page">
    <header class="header">
        <div class="header-container">
            <button class="back-button hidden" type="button" aria-label="Wstecz">
                <img src="images/back-icon.png" alt="Wstecz" class="back-icon">
            </button>
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="CEMBORKA Logo">
            </a>
            <button class="menu-button" aria-label="Menu" aria-expanded="false" type="button">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="contact-container" id="kontakt">
        <section class="contact-card" aria-labelledby="contactTitle">
            <h1 id="contactTitle" class="contact-title">KONTAKT</h1>
            <a class="contact-email" href="mailto:cemborka.studio@gmail.com">cemborka.studio@gmail.com</a>
            <div class="contact-socials" aria-label="Social media Cemborka">
                <a href="#" class="contact-social-link" aria-label="Facebook">
                    <img src="images/fb-icon.png" alt="Facebook">
                </a>
                <a href="https://www.instagram.com/cemborka/" class="contact-social-link" aria-label="Instagram">
                    <img src="images/insta-icon.png" alt="Instagram">
                </a>
                <a href="#" class="contact-social-link" aria-label="TikTok">
                    <img src="images/tiktok-icon.png" alt="TikTok">
                </a>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
